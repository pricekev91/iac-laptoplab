name: llama
project: ai-infra
variant:
  default: cpu
  supported:
    - cpu
    - nvidia
    - amd
  select_from: host.gpu

container:
  name: llama
  image: ubuntu:24.04
  profiles:
    - default
    - gpu
  mounts:
    - host: "{{ host.model_dir }}"
      container: /models
      readonly: true
  env:
    AI_ENGINE_MODEL: /models/{{ host.ai_engine_model }}
  command: >
    /usr/local/bin/ai-engine --model $AI_ENGINE_MODEL --host 0.0.0.0 --port 8080

runtime:
  service_name: ai-engine
  install_script: scripts/provision-ai-engine.bash

ports:
  - host: 8080
    container: 8080
    bind_local_only: true