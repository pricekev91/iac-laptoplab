name: openwebui
project: ai-dev
variant:
  default: cpu
  supported:
    - cpu
    - nvidia
    - amd
  select_from: host.gpu

container:
  name: openwebui
  image: ubuntu:24.04
  profiles:
    - default
  mounts:
    - host: "{{ host.model_dir }}"
      container: /models
      readonly: true
  env:
    BACKEND_URL: http://llama.ai-infra:8080
  command: >
    /usr/local/bin/openwebui --host 0.0.0.0 --port 3000

ports:
  - host: 3000
    container: 3000
    bind_local_only: true