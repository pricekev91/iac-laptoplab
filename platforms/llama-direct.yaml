name: llama-direct
project: llama

container:
  name: llama
  image: ubuntu:24.04
  profiles:
    - default
    - gpu
  mounts:
    - host: /usr/lib
      container: /opt/host-lib
      readonly: true
  env:
    LLAMA_MODEL_URL: https://huggingface.co/mistralai/Ministral-3-3B-Instruct-2512-GGUF/resolve/main/Ministral-3-3B-Instruct-2512-Q5_K_M.gguf
    LLAMA_MODEL_PATH: /srv/ai/state/models/Ministral-3-3B-Instruct-2512-Q5_K_M.gguf
    LLAMA_CTX_SIZE: "32000"
    LLAMA_THREADS: "4"
    LLAMA_GPU_LAYERS: "0"
    LLAMA_PORT: "8080"
  command: /usr/local/bin/llama-server-start

runtime:
  service_name: llama-server
  install_script: scripts/provision-llama-direct.bash

ports:
  - host: 8090
    container: 8080
    bind_local_only: false
